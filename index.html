<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>MadLibs</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #141e30, #243b55);
            color: #edf2f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            width: min(100%, 720px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin-top: 0;
            font-size: 1.9rem;
            color: #f1faee;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 18px;
        }

        button {
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #47b2ff, #2d8ff4);
            color: #ffffff;
            padding: 11px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        #inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 12px;
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: .95rem;
        }

        input,
        textarea {
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 10px;
            font-size: 0.96rem;
            background: rgba(255, 255, 255, 0.15);
            color: #f8f9fa;
            outline: none;
            transition: border 0.2s ease;
        }

        input:focus,
        textarea:focus {
            border-color: #7dd3fc;
            background: rgba(255, 255, 255, 0.2);
        }

        #error {
            color: #ffb3b3;
            min-height: 1.25rem;
            margin-bottom: 12px;
            font-weight: 600;
            text-align: center;
        }

        #result {
            background: rgba(30, 78, 162, 0.38);
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            line-height: 1.5;
            color: #e9f1ff;
            min-height: 88px;
        }

        .hint {
            font-size: 0.88rem;
            color: #b8c8e8;
            text-align: center;
            margin-bottom: 6px;
        }

        @media (max-width: 540px) {
            #inputs {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>MadLibs Adventure</h1>
        <p class="hint">Click Start, fill all fields, then Generate your story.</p>

        <div class="actions">
            <button id="start">Start</button>
            <button id="generate" disabled>Generate</button>
        </div>

        <div id="inputs"></div>

        <p id="error"></p>
        <div id="result">Your generated story will appear here.</div>
    </div>

    <script>
        let currentTemplate = '';

        const startBtn = document.getElementById('start');
        const generateBtn = document.getElementById('generate');
        const inputsDiv = document.getElementById('inputs');
        const errorMsg = document.getElementById('error');
        const resultBlock = document.getElementById('result');

        async function fetchTemplate() {
            errorMsg.innerText = '';
            resultBlock.innerText = 'Loading template...';
            try {
                const res = await fetch('http://localhost:3000/template');
                if (!res.ok) {
                    throw new Error('Failed to fetch template');
                }
                const data = await res.json();
                currentTemplate = data.template || '';
                const placeholders = Array.isArray(data.placeholders) ? data.placeholders : [];

                inputsDiv.innerHTML = '';
                resultBlock.innerText = '';

                if (!currentTemplate || placeholders.length === 0) {
                    errorMsg.innerText = 'No placeholders found in template. Click Start again.';
                    generateBtn.disabled = true;
                    return;
                }

                placeholders.forEach(ph => {
                    const fieldContainer = document.createElement('div');
                    const label = document.createElement('label');
                    const input = document.createElement('input');

                    label.setAttribute('for', ph);
                    label.innerText = ph.replace(/\d+$/, '') + ' (' + ph + ')';
                    input.id = ph;
                    input.type = 'text';
                    input.placeholder = 'Enter a ' + ph.replace(/\d+$/, '') + '...';

                    fieldContainer.appendChild(label);
                    fieldContainer.appendChild(input);
                    inputsDiv.appendChild(fieldContainer);
                });

                generateBtn.disabled = false;
                resultBlock.innerText = 'Template loaded. Fill in the fields and click Generate.';
            } catch (error) {
                errorMsg.innerText = 'Unable to load template: ' + error.message;
                resultBlock.innerText = '';
                generateBtn.disabled = true;
            }
        }

        async function generateStory() {
            errorMsg.innerText = '';
            const inputEls = inputsDiv.querySelectorAll('input');
            const words = {};
            const missing = [];

            inputEls.forEach(input => {
                const value = input.value.trim();
                if (!value) {
                    missing.push(input.id);
                    input.style.border = '2px solid #ff8080';
                } else {
                    input.style.border = '';
                    words[input.id] = value;
                }
            });

            if (missing.length > 0) {
                errorMsg.innerText = 'Please fill: ' + missing.join(', ');
                return;
            }

            const res = await fetch('http://localhost:3000/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ template: currentTemplate, words })
            });

            const data = await res.json();
            if (!res.ok) {
                errorMsg.innerText = data.error || 'Failed to generate story';
                return;
            }

            errorMsg.innerText = '';
            resultBlock.innerText = data.story || 'No story produced.';
        }

        startBtn.addEventListener('click', fetchTemplate);
        generateBtn.addEventListener('click', generateStory);
    </script>
</body>

</html>
